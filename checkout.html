<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Checkout - TerraVerse Network</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Checkout TerraVerse - Vérifie ton panier avant de finaliser sur Tebex.">
  <link rel="icon" type="image/png" href="logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260401-1">

  <style>
    body.checkout-page {
      min-height: 100vh;
      color: #f5f7ff;
    }

    .checkout-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 6.6rem 1.5rem 3rem;
      position: relative;
      z-index: 1;
    }

    .checkout-hero {
      margin-bottom: 1.3rem;
    }

    .checkout-kicker {
      margin: 0 0 0.45rem;
      color: rgba(0, 229, 255, 0.92);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .checkout-hero h1 {
      margin: 0;
      font-size: 2.35rem;
      line-height: 1.05;
    }

    .checkout-hero p {
      margin: 0.55rem 0 0;
      color: rgba(245, 247, 255, 0.7);
      max-width: 720px;
    }

    /* --- IFRAME CHECKOUT --- */
    .checkout-shell {
      width: 100%;
      height: 1000px;
      background: rgba(8, 18, 34, 0.76);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      overflow: hidden;
      backdrop-filter: blur(16px);
      box-shadow: 0 22px 54px rgba(0, 0, 0, 0.34);
      margin-top: 2rem;
    }

    .checkout-shell iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (max-width: 640px) {
      .checkout-hero h1 {
        font-size: 1.65rem;
      }
    }
  </style>
</head>

<body class="checkout-page">
  <canvas id="particles"></canvas>

  <!-- HEADER -->
  <header>
    <div class="nav-container">
      <div class="nav-logo">
        <img src="logo.png" alt="TerraVerse" class="nav-logo-img">
        <span class="nav-logo-text">TerraVerse</span>
      </div>

      <button class="burger" id="burger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>

      <nav class="nav-links" id="navLinks">
        <a href="index.html#modes">Modes</a>
        <a href="shop.html" style="color:#00e5ff">Boutique</a>
        <a href="vote.html">Vote</a>
        <a href="index.html#discord">Discord</a>
      </nav>

      <div class="account-mini" id="changePseudoBtn" title="Changer le pseudo">
        <img id="headerAccountAvatar" src="https://mc-heads.net/avatar/Steve/48" alt="Compte">
        <strong id="headerAccountName">Invite</strong>
        <span class="name-switch">⇄</span>
      </div>

      <button class="btn-jouer" onclick="window.location.href='index.html#howto'">▶ Jouer</button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="checkout-wrap">
    <section class="checkout-hero">
      <p class="checkout-kicker">FINALISER</p>
      <h1>Vérifie ton panier avant Tebex</h1>
      <p>Tu restes dans l’univers visuel TerraVerse, puis tu passes sur Tebex uniquement pour la validation finale du paiement.</p>
    </section>

    <a href="shop.html" class="back-link">↶ Continuer mes achats</a>

    <!-- IFRAME CHECKOUT TEBEX -->
    <section class="checkout-shell">
      <iframe src="https://terraverse-shop.tebex.io/checkout"></iframe>
    </section>
  </main>

  <!-- MODAL PSEUDO (inchangé) -->
  <div class="modal-backdrop" id="shopModalBackdrop" aria-hidden="true">
    <div class="shop-modal" role="dialog" aria-modal="true" aria-labelledby="shopModalTitle">
      <button class="close-modal" id="closeShopModal" aria-label="Fermer">×</button>
      <h3 id="shopModalTitle">Entre ton pseudo Minecraft</h3>
      <p class="target-label" id="serverTarget">Changer le pseudo</p>
      <img id="avatarPreview" class="avatar-preview" src="https://mc-heads.net/avatar/Steve/64" alt="Aperçu skin">

      <div class="version-switch" id="versionSwitch">
        <button type="button" class="active" data-version="java">Java</button>
        <button type="button" data-version="bedrock">Bedrock</button>
      </div>

      <div class="input-row">
        <input id="pseudoInput" type="text" maxlength="16" placeholder="Entre ton pseudo ici">
        <button class="submit-btn" id="submitShop">→</button>
      </div>
    </div>
  </div>

  <script src="particles.js?v=20260401-1"></script>
  <script>
    /* Gestion pseudo (inchangé) */
    const STORAGE_PSEUDO = "terraversePseudo";
    const pseudoInput = document.getElementById("pseudoInput");
    const avatarPreview = document.getElementById("avatarPreview");
    const accountName = document.getElementById("headerAccountName");
    const accountAvatar = document.getElementById("headerAccountAvatar");
    const changePseudoBtn = document.getElementById("changePseudoBtn");
    const backdrop = document.getElementById("shopModalBackdrop");
    const closeBtn = document.getElementById("closeShopModal");
    const submitShop = document.getElementById("submitShop");

    function updateAvatar() {
      const pseudo = pseudoInput.value.trim();
      avatarPreview.src = pseudo ? `https://mc-heads.net/avatar/${encodeURIComponent(pseudo)}/64` : "https://mc-heads.net/avatar/Steve/64";
    }

    function updateAccountUI(pseudo) {
      const safe = pseudo || "Invite";
      accountName.textContent = safe;
      accountAvatar.src = pseudo ? `https://mc-heads.net/avatar/${encodeURIComponent(pseudo)}/48` : "https://mc-heads.net/avatar/Steve/48";
    }

    function openPseudoModal() {
      pseudoInput.value = localStorage.getItem(STORAGE_PSEUDO) || "";
      updateAvatar();
      backdrop.classList.add("open");
    }

    function closeModal() {
      backdrop.classList.remove("open");
    }

    pseudoInput.addEventListener("input", updateAvatar);
    changePseudoBtn.addEventListener("click", openPseudoModal);
    closeBtn.addEventListener("click", closeModal);
    backdrop.addEventListener("click", e => { if (e.target === backdrop) closeModal(); });

    submitShop.addEventListener("click", () => {
      const pseudo = pseudoInput.value.trim();
      if (!pseudo) return alert("Entre ton pseudo Minecraft.");
      localStorage.setItem(STORAGE_PSEUDO, pseudo);
      updateAccountUI(pseudo);
      closeModal();
    });

    updateAccountUI(localStorage.getItem(STORAGE_PSEUDO));
  </script>
</body>
</html>
